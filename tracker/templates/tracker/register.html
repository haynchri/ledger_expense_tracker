<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Ledger</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3350; --accent: #7c6af7; --accent-light: #a599ff; --text: #e8eaf6; --muted: #8b90b0; --red: #f87171; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-wrap { width: 100%; max-width: 420px; padding: 20px; }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo h1 { font-family: 'DM Serif Display', serif; font-size: 2.2rem; color: var(--accent-light); }
    .auth-logo p { color: var(--muted); font-size: 0.85rem; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; }
    .auth-card h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
    .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 13px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; outline: none; transition: border-color 0.15s; }
    .form-input:focus { border-color: var(--accent); }
    .form-help { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }
    .btn { display: block; width: 100%; padding: 11px; border-radius: 8px; background: var(--accent); color: #fff; font-size: 0.88rem; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; margin-top: 4px; }
    .btn:hover { background: var(--accent-light); color: var(--bg); }
    .error-list { background: rgba(248,113,113,0.1); border: 1px solid var(--red); border-radius: 8px; padding: 8px 13px; margin-bottom: 14px; font-size: 0.82rem; color: var(--red); }
    .auth-footer { text-align: center; margin-top: 18px; font-size: 0.83rem; color: var(--muted); }
    .auth-footer a { color: var(--accent-light); text-decoration: none; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-logo">
      <h1>Ledger</h1>
      <p>Your personal finance tracker</p>
    </div>
    <div class="auth-card">
      <h2>Create your account</h2>
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
          <div class="form-group">
            <label class="form-label">{{ field.label }}</label>
            {% if field.errors %}
              <div class="error-list">{% for e in field.errors %}{{ e }}{% endfor %}</div>
            {% endif %}
            <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}" class="form-input" {% if field.value %}value="{{ field.value }}"{% endif %}>
            {% if field.help_text %}<div class="form-help">{{ field.help_text }}</div>{% endif %}
          </div>
        {% endfor %}
        <button type="submit" class="btn">Create Account</button>
      </form>
    </div>
    <div class="auth-footer">Already have an account? <a href="{% url 'login' %}">Sign in</a></div>
  </div>
</body>
</html>
