<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Ledger</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
      --border: #2e3350; --accent: #7c6af7; --accent-light: #a599ff;
      --text: #e8eaf6; --muted: #8b90b0; --red: #f87171;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }

    .auth-wrap { width: 100%; max-width: 400px; padding: 20px; }

    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo h1 { font-family: 'DM Serif Display', serif; font-size: 2.5rem; color: var(--accent-light); }
    .auth-logo p { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
    }

    .auth-card h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 24px; }

    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.15s; }
    .form-input:focus { border-color: var(--accent); }

    .btn { display: block; width: 100%; padding: 11px; border-radius: 8px; background: var(--accent); color: #fff; font-size: 0.9rem; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; transition: background 0.15s; text-align: center; text-decoration: none; }
    .btn:hover { background: var(--accent-light); color: var(--bg); }

    .auth-footer { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--muted); }
    .auth-footer a { color: var(--accent-light); text-decoration: none; }

    .error-list { background: rgba(248,113,113,0.1); border: 1px solid var(--red); border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 0.85rem; color: var(--red); list-style: none; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-logo">
      <h1>Ledger</h1>
      <p>Your personal finance tracker</p>
    </div>
    <div class="auth-card">
      <h2>Sign in to your account</h2>
      {% if form.errors %}
      <ul class="error-list">
        <li>Invalid username or password.</li>
      </ul>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-input" autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input">
        </div>
        <button type="submit" class="btn">Sign In</button>
      </form>
    </div>
    <div class="auth-footer">
      Don't have an account? <a href="{% url 'register' %}">Create one</a>
    </div>
  </div>
</body>
</html>
